<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guida Qualifica Cliente — AI On-Premise</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #ebebea;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-lg: 14px;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-border: #B5D4F4;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-border: #F7C1C1;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-border: #C0DD97;
    --amber: #854F0B; --amber-bg: #FAEEDA; --amber-border: #FAC775;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333331;
      --text: #e8e6de; --text2: #a8a69e; --text3: #6e6c66;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --blue: #85B7EB; --blue-bg: #0c2a47; --blue-border: #185FA5;
      --red: #F09595; --red-bg: #3d1515; --red-border: #791F1F;
      --green: #97C459; --green-bg: #1a2e08; --green-border: #3B6D11;
      --amber: #EF9F27; --amber-bg: #2e1e05; --amber-border: #854F0B;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .wrapper { width: 100%; max-width: 560px; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: .25rem; }
  .header p { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; }
  .phase-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); margin-bottom: .6rem; }
  .step-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: .35rem; line-height: 1.3; }
  .step-sub { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 1rem; }
  .progress { display: flex; gap: 5px; margin-bottom: 1rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: background .2s; }
  .dot.done { background: var(--blue); }
  .tips { background: var(--bg2); border-radius: var(--radius); padding: .75rem 1rem; margin-bottom: 1rem; }
  .tips p { font-size: 12px; color: var(--text2); margin-bottom: .3rem; line-height: 1.5; }
  .tips p:last-child { margin-bottom: 0; }
  .options { display: flex; flex-direction: column; gap: .5rem; }
  .opt-btn { width: 100%; text-align: left; padding: .7rem 1rem; font-size: 13px; font-family: inherit; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; line-height: 1.4; transition: background .15s, border-color .15s; }
  .opt-btn:hover { background: var(--bg2); }
  .opt-btn.yes { border-color: var(--green-border); color: var(--green); }
  .opt-btn.yes:hover { background: var(--green-bg); }
  .opt-btn.no { border-color: var(--red-border); color: var(--red); }
  .opt-btn.no:hover { background: var(--red-bg); }
  .result-box { border-radius: var(--radius); padding: 1rem; margin-top: 1rem; }
  .result-box.success { background: var(--green-bg); border: 0.5px solid var(--green-border); }
  .result-box.danger { background: var(--red-bg); border: 0.5px solid var(--red-border); }
  .result-box.warning { background: var(--amber-bg); border: 0.5px solid var(--amber-border); }
  .result-box .rb-title { font-size: 13px; font-weight: 600; margin-bottom: .5rem; }
  .result-box.success .rb-title { color: var(--green); }
  .result-box.danger .rb-title { color: var(--red); }
  .result-box.warning .rb-title { color: var(--amber); }
  .result-box .action { display: flex; gap: .4rem; margin-bottom: .35rem; font-size: 13px; line-height: 1.5; }
  .result-box.success .action { color: var(--green); }
  .result-box.danger .action { color: var(--red); }
  .result-box.warning .action { color: var(--amber); }
  .nav { display: flex; gap: .5rem; margin-top: 1rem; flex-wrap: wrap; }
  .btn-back, .btn-restart { background: none; border: none; font-size: 12px; color: var(--text2); cursor: pointer; font-family: inherit; padding: .3rem .25rem; }
  .btn-back:hover, .btn-restart:hover { color: var(--text); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>Guida qualifica cliente</h1>
    <p>Segui le domande per capire se il cliente è adatto a una soluzione AI on-premise e cosa fare in ogni scenario.</p>
  </div>
  <div class="card" id="guide"></div>
</div>

<script>
const steps = {
  start: {
    phase: 'Fase 1 — Esplorazione',
    title: 'Come è arrivato questo cliente?',
    sub: 'Capire il punto di partenza aiuta a scegliere il giusto approccio.',
    progress: 1,
    options: [
      { label: '🏢 Vuole una soluzione on-premise', next: 'onprem' },
      { label: '💸 Si lamenta del costo dei token cloud', next: 'token_cost' },
      { label: '☁️ Sta già comprando una licenza enterprise cloud (Gemini, ecc.)', next: 'enterprise_cloud' },
      { label: '🔍 Nessuna delle precedenti — non sa ancora cosa vuole', next: 'explore_need' }
    ]
  },
  onprem: {
    phase: 'Fase 2 — Qualifica AI',
    title: 'Perché vuole una soluzione on-premise?',
    sub: 'Capire la motivazione è fondamentale per valutare se il cliente è in target.',
    progress: 2,
    tips: ['💬 "Quali dati userebbe con l\'AI? Ci sono vincoli di privacy o compliance?"', '💬 "Ha già un ambiente IT strutturato on-site?"'],
    options: [
      { label: '🔒 Privacy / GDPR — dati sensibili che non possono uscire', next: 'has_usecase', type: 'yes' },
      { label: '📊 Costo certo — vuole predictable cost vs token', next: 'has_usecase', type: 'yes' },
      { label: '⚠️ Vuole "ChatGPT ma gratis" — uso generico senza vincoli reali', next: 'redflag', type: 'no' }
    ]
  },
  token_cost: {
    phase: 'Fase 2 — Qualifica AI',
    title: 'Per quale caso d\'uso usa la licenza enterprise?',
    sub: 'Chi si lamenta dei token ha già un utilizzo. Capire quale.',
    progress: 2,
    tips: ['💬 "Quanto spende al mese in token? Con che volumi lavora?"', '💬 "Questi dati passano su cloud oggi? C\'è un problema di compliance?"'],
    options: [
      { label: '✅ Uso interno intensivo con dati sensibili', next: 'has_usecase', type: 'yes' },
      { label: '⚠️ Uso leggero / esplorativo — nessun caso d\'uso chiaro', next: 'redflag', type: 'no' }
    ]
  },
  enterprise_cloud: {
    phase: 'Fase 2 — Qualifica AI',
    title: 'A cosa serve la licenza enterprise che sta comprando?',
    sub: 'Capire perché sta valutando cloud enterprise aiuta a posizionare l\'alternativa on-premise.',
    progress: 2,
    tips: ['💬 "Perché sta valutando una soluzione cloud enterprise e non on-premise?"', '💬 "Ha requisiti di data residency o audit trail?"'],
    options: [
      { label: '✅ Ha dati sensibili / compliance — il cloud è un compromesso', next: 'has_usecase', type: 'yes' },
      { label: '⚠️ Vuole solo un tool collaborativo generico per i dipendenti', next: 'redflag', type: 'no' }
    ]
  },
  explore_need: {
    phase: 'Fase 2 — Qualifica AI',
    title: 'Il cliente non ha ancora chiaro cosa vuole fare con l\'AI?',
    sub: 'In questo caso il tuo obiettivo è fare discovery, non vendere.',
    progress: 2,
    tips: ['💬 "Quali processi interni sono più ripetitivi o lenti oggi?"', '💬 "Ha già sperimentato con ChatGPT? Con quali risultati?"'],
    options: [
      { label: '✅ Emerge un bisogno concreto durante la conversazione', next: 'has_usecase', type: 'yes' },
      { label: '⚠️ Nessun caso d\'uso concreto — solo curiosità generica', next: 'redflag', type: 'no' }
    ]
  },
  redflag: {
    phase: '🚩 Red flag — Cliente fuori target',
    title: 'Questo cliente non è in target',
    sub: 'Vuole solo un ChatGPT più economico o non ha un caso d\'uso reale. Una soluzione on-premise non risolve il suo problema.',
    progress: 2,
    result: { type: 'danger', actions: [
      'Non procedere con il processo di vendita on-premise',
      'Spiega che la soluzione richiede un caso d\'uso specifico e infrastruttura dedicata',
      'Suggerisci di tornare quando ha identificato un progetto concreto',
      'Tieni il contatto: potrebbe maturare in futuro'
    ]}
  },
  has_usecase: {
    phase: 'Fase 3 — Scenari possibili',
    title: 'Il cliente vuole ChatGPT in locale o ha casi d\'uso specifici?',
    sub: 'La risposta determina il percorso commerciale.',
    progress: 3,
    options: [
      { label: '💬 ChatGPT in locale — tool generale per i dipendenti', next: 'chatgpt_local' },
      { label: '⚙️ Casi d\'uso specifici — automazione, RAG, agenti, ecc.', next: 'specific_usecase' }
    ]
  },
  chatgpt_local: {
    phase: 'Fase 3 — Budget',
    title: 'Ha budget adeguato per una soluzione on-premise generale?',
    sub: 'Una soluzione tipo "ChatGPT privato" richiede infrastruttura significativa. Il budget minimo indicativo è di 2 milioni di euro.',
    progress: 3,
    tips: ['💬 "Qual è il budget approssimativo per questo progetto?"', '💬 "Quanti utenti devono accedere alla piattaforma?"'],
    options: [
      { label: '✅ Sì — ha budget superiore a 2 milioni di euro', next: 'proceed_general', type: 'yes' },
      { label: '⚠️ No — budget inferiore a 2 milioni, vuole stare in locale a tutti i costi', next: 'find_usecase', type: 'no' }
    ]
  },
  proceed_general: {
    phase: '✅ Cliente qualificato',
    title: 'Vai alla Fase 4: fattibilità',
    sub: 'Il cliente vuole ChatGPT in locale e ha budget. È in target.',
    progress: 4,
    result: { type: 'success', actions: [
      'Crea un POC sulla tua macchina NFR da mostrare al cliente',
      'Offerta: includi giornate uomo per formazione e setup se necessario',
      'Se sei System Integrator: proponi un piano di sviluppo da allegare all\'offerta',
      'Se sei Reseller: chiedi a Galene di mappare un partner SI e proponi solo hardware + software'
    ]}
  },
  find_usecase: {
    phase: 'Fase 3 — Reindirizzo',
    title: 'Budget limitato: trova casi d\'uso specifici',
    sub: 'Se vuole restare on-premise ma il budget non supporta una soluzione generale, orienta verso un progetto più circoscritto.',
    progress: 3,
    tips: ['💬 "C\'è un reparto o processo specifico dove l\'AI darebbe più valore?"', '💬 "Avete problemi con gestione documentale, assistenza clienti o reportistica?"'],
    options: [
      { label: '✅ Emerge un caso d\'uso specifico', next: 'specific_usecase', type: 'yes' },
      { label: '⚠️ Nessun caso d\'uso — insiste su soluzione generale senza budget', next: 'redflag_budget', type: 'no' }
    ]
  },
  redflag_budget: {
    phase: '🚩 Red flag — Budget insufficiente',
    title: 'Cliente non qualificato per ora',
    sub: 'Vuole una soluzione on-premise generale ma non ha budget sufficiente e non riesce a identificare un caso d\'uso specifico.',
    progress: 3,
    result: { type: 'danger', actions: [
      'Non procedere con l\'offerta',
      'Spiega chiaramente il costo minimo di una soluzione on-premise',
      'Proponi di tornare quando ha identificato un budget o un progetto specifico',
      'Tieni il contatto'
    ]}
  },
  specific_usecase: {
    phase: 'Fase 4 — Fattibilità',
    title: 'Il caso d\'uso è semplice o complesso?',
    sub: 'Valuta la complessità tecnica del caso d\'uso identificato.',
    progress: 4,
    tips: ['Semplice: ricerca documentale, Q&A su knowledge base, assistente virtuale standard', 'Complesso: integrazione con sistemi legacy, agenti autonomi, fine-tuning, pipeline dati'],
    options: [
      { label: '✅ Caso d\'uso semplice', next: 'poc_simple', type: 'yes' },
      { label: '⚙️ Caso d\'uso complesso', next: 'complex_partner' }
    ]
  },
  poc_simple: {
    phase: '✅ Procedi con POC',
    title: 'Crea un POC e prepara l\'offerta',
    sub: 'Caso d\'uso semplice e cliente qualificato.',
    progress: 4,
    result: { type: 'success', actions: [
      'Crea il POC sulla tua macchina NFR da mostrare al cliente',
      'Offerta: includi licenze software, hardware, e giornate uomo per setup e formazione',
      'Definisci chiaramente scope e deliverable del progetto'
    ]}
  },
  complex_partner: {
    phase: 'Fase 4 — Caso complesso',
    title: 'Chi sei tu in questo deal?',
    sub: 'La strategia cambia in base al tuo ruolo nel canale.',
    progress: 4,
    options: [
      { label: '🔧 Sono System Integrator', next: 'si_offer' },
      { label: '🤝 Sono Reseller', next: 'reseller_offer' }
    ]
  },
  si_offer: {
    phase: '✅ System Integrator — Offerta',
    title: 'Proponi un piano di sviluppo',
    sub: 'Il caso è complesso ma sei attrezzato per svilupparlo.',
    progress: 4,
    result: { type: 'success', actions: [
      'Prepara un piano di sviluppo dettagliato da allegare all\'offerta',
      'Includi: analisi, architettura, sviluppo, testing, formazione',
      'Offerta: hardware + software + giornate uomo di sviluppo'
    ]}
  },
  reseller_offer: {
    phase: '✅ Reseller — Offerta',
    title: 'Coinvolgi Galene per il supporto tecnico',
    sub: 'Il caso è complesso: non svilupparlo da solo.',
    progress: 4,
    result: { type: 'success', actions: [
      'Chiedi a Galene di mappare un partner System Integrator adatto',
      'La tua offerta copre: hardware + software',
      'Il SI gestisce la parte di sviluppo e integrazione',
      'Coordina con il SI per presentare un\'offerta unitaria al cliente'
    ]}
  }
};

const totalSteps = 5;
let history = [];

function render(key) {
  const s = steps[key];
  const g = document.getElementById('guide');
  let h = '';

  // Progress
  h += '<div class="progress">';
  for (let i = 1; i <= totalSteps; i++) h += `<div class="dot${i <= s.progress ? ' done' : ''}"></div>`;
  h += '</div>';

  h += `<div class="phase-label">${s.phase}</div>`;
  h += `<div class="step-title">${s.title}</div>`;
  h += `<div class="step-sub">${s.sub}</div>`;

  if (s.tips) {
    h += '<div class="tips">';
    s.tips.forEach(t => h += `<p>${t}</p>`);
    h += '</div>';
  }

  if (s.options) {
    h += '<div class="options">';
    s.options.forEach(opt => {
      const cls = opt.type === 'yes' ? ' yes' : opt.type === 'no' ? ' no' : '';
      h += `<button class="opt-btn${cls}" onclick="go('${opt.next}','${key}')">${opt.label}</button>`;
    });
    h += '</div>';
  }

  if (s.result) {
    const r = s.result;
    h += `<div class="result-box ${r.type}"><div class="rb-title">Cosa fare</div>`;
    r.actions.forEach(a => h += `<div class="action"><span>→</span><span>${a}</span></div>`);
    h += '</div>';
  }

  h += '<div class="nav">';
  if (history.length > 0) h += `<button class="btn-back" onclick="goBack()">← Torna indietro</button>`;
  if (s.result) h += `<button class="btn-restart" onclick="restart()">↩ Ricomincia da capo</button>`;
  h += '</div>';

  g.innerHTML = h;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function go(next, from) { history.push(from); render(next); }
function goBack() { render(history.pop()); }
function restart() { history = []; render('start'); }

render('start');
</script>
</body>
</html>
